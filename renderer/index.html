<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ASSI Sync</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard Variable', -apple-system, sans-serif; }
    body { background: #F4F3EE; color: #1A1A1A; overflow: hidden; user-select: none; }

    /* ── Title Bar ── */
    .titlebar {
      -webkit-app-region: drag;
      height: 36px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px; background: #F4F3EE;
    }
    .titlebar-title { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #828DF8; }
    .titlebar-btns { -webkit-app-region: no-drag; display: flex; gap: 6px; }
    .titlebar-btns button {
      width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer;
    }
    .btn-close { background: #FF5F57; }
    .btn-maximize { background: #28C840; }
    .btn-minimize { background: #FFBD2E; }

    /* ── Screens ── */
    .screen { display: none; height: calc(100vh - 36px); flex-direction: column; }
    .screen.active { display: flex; }

    /* ── Login Screen ── */
    #login-screen {
      align-items: center; justify-content: center; gap: 24px; padding: 40px;
    }
    .logo { font-size: 36px; font-weight: 900; letter-spacing: -0.02em; color: #1A1A1A; }
    .logo-sub { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #828DF8; font-weight: 700; }
    .login-desc { font-size: 13px; color: #999; text-align: center; line-height: 1.6; }
    .btn-google {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 28px; background: white; border: 1px solid #ddd; border-radius: 16px;
      font-size: 14px; font-weight: 600; color: #333; cursor: pointer;
      transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .btn-google:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); transform: translateY(-1px); }
    .btn-google img { width: 20px; height: 20px; }

    /* ── Setup Screen ── */
    #setup-screen { padding: 32px 28px; gap: 20px; }
    .welcome { font-size: 22px; font-weight: 900; letter-spacing: -0.02em; }
    .welcome-sub { font-size: 12px; color: #999; margin-top: 2px; }
    .folder-box {
      background: white; border-radius: 20px; padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .folder-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #999; font-weight: 700; margin-bottom: 8px; }
    .folder-path {
      font-size: 13px; color: #666; padding: 12px 16px; background: #F4F3EE; border-radius: 12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-height: 42px;
      display: flex; align-items: center;
    }
    .folder-path.empty { color: #bbb; font-style: italic; }
    .btn-select-folder {
      margin-top: 10px; width: 100%; padding: 12px; background: #F4F3EE; border: 1px dashed #ccc;
      border-radius: 12px; font-size: 13px; color: #666; cursor: pointer; font-weight: 600;
      transition: all 0.2s;
    }
    .btn-select-folder:hover { border-color: #828DF8; color: #828DF8; }
    .btn-start {
      width: 100%; padding: 16px; background: #828DF8; color: white; border: none;
      border-radius: 16px; font-size: 15px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 16px rgba(130,141,248,0.3); transition: all 0.2s;
      margin-top: auto;
    }
    .btn-start:hover { background: #7078E8; transform: translateY(-1px); }
    .btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Sync Screen ── */
    #sync-screen { padding: 0; }
    .sync-header {
      padding: 20px 24px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .sync-status { font-size: 13px; font-weight: 700; }
    .sync-status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
    .dot.syncing { background: #828DF8; animation: pulse 1.5s infinite; }
    .dot.watching { background: #4ADE80; }
    .dot.error { background: #EF4444; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .sync-info { font-size: 11px; color: #999; }
    .btn-stop {
      font-size: 11px; padding: 6px 14px; border-radius: 8px;
      border: 1px solid #ddd; background: white; color: #666; cursor: pointer;
      font-weight: 600;
    }

    /* ── File List (Google Drive style) ── */
    .file-list {
      flex: 1; overflow-y: auto; padding: 8px 0;
    }
    .file-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 24px; transition: background 0.15s;
    }
    .file-item:hover { background: rgba(0,0,0,0.02); }
    .file-icon {
      width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .file-icon.image { background: #E0E7FF; }
    .file-icon.video { background: #FCE7F3; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: 10px; color: #999; margin-top: 2px; }
    .file-progress {
      width: 100%; height: 3px; background: #E5E7EB; border-radius: 2px; margin-top: 4px; overflow: hidden;
    }
    .file-progress-bar {
      height: 100%; background: #828DF8; border-radius: 2px;
      transition: width 0.3s ease;
    }
    .file-status { flex-shrink: 0; font-size: 11px; font-weight: 600; }
    .file-status.done { color: #4ADE80; }
    .file-status.failed { color: #EF4444; }
    .file-status.uploading { color: #828DF8; }

    .btn-retry {
      padding: 4px 12px; background: #FEE2E2; color: #EF4444; border: none;
      border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-retry:hover { background: #EF4444; color: white; }

    /* ── Summary Bar ── */
    .summary-bar {
      padding: 12px 24px; border-top: 1px solid rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: space-between;
      background: white;
    }
    .summary-text { font-size: 11px; color: #999; }
    .summary-text strong { color: #1A1A1A; }
    .btn-retry-all {
      padding: 8px 16px; background: #828DF8; color: white; border: none;
      border-radius: 10px; font-size: 11px; font-weight: 700; cursor: pointer;
    }
    .btn-retry-all:hover { background: #7078E8; }

    .empty-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px; color: #ccc;
    }
    .empty-state span { font-size: 36px; }
    .empty-state p { font-size: 12px; }

    /* ── Pending Folders Section ── */
    .pending-section {
      border-bottom: 1px solid rgba(0,0,0,0.06); padding: 0;
    }
    .pending-header {
      padding: 12px 24px 8px; font-size: 10px; letter-spacing: 0.15em;
      text-transform: uppercase; color: #828DF8; font-weight: 700;
    }
    .pending-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 24px; transition: background 0.15s;
    }
    .pending-item:hover { background: rgba(0,0,0,0.02); }
    .pending-icon {
      width: 32px; height: 32px; border-radius: 10px; background: #FEF3C7;
      display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .pending-info { flex: 1; min-width: 0; }
    .pending-name { font-size: 12px; font-weight: 700; color: #1A1A1A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pending-meta { font-size: 10px; color: #999; margin-top: 2px; }
    .pending-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-pending {
      padding: 5px 12px; border: none; border-radius: 8px; font-size: 10px;
      font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-pending.upload { background: #828DF8; color: white; }
    .btn-pending.upload:hover { background: #7078E8; }
    .btn-pending.remove { background: #F4F3EE; color: #999; }
    .btn-pending.remove:hover { background: #FEE2E2; color: #EF4444; }
    .btn-pending.resync { background: #E0E7FF; color: #828DF8; }
    .btn-pending.resync:hover { background: #828DF8; color: white; }
    .synced-badge {
      font-size: 9px; font-weight: 700; color: #4ADE80; background: #F0FDF4;
      padding: 2px 8px; border-radius: 6px; letter-spacing: 0.05em;
    }

    /* ── Folder Approval Toast ── */
    .folder-toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: white; border-radius: 20px; padding: 16px 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15); width: 380px; z-index: 100;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
    .toast-title { font-size: 13px; font-weight: 800; color: #1A1A1A; letter-spacing: -0.01em; }
    .toast-desc { font-size: 11px; color: #999; margin-top: 4px; }
    .toast-actions { display: flex; gap: 8px; margin-top: 12px; }
    .toast-btn {
      flex: 1; padding: 10px; border: none; border-radius: 12px; font-size: 12px;
      font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .toast-btn.approve { background: #828DF8; color: white; box-shadow: 0 2px 8px rgba(130,141,248,0.3); }
    .toast-btn.approve:hover { background: #7078E8; }
    .toast-btn.deny { background: #F4F3EE; color: #999; }
    .toast-btn.deny:hover { background: #E8E7E2; color: #666; }

    /* ── Explorer: file items, rename, reorder ── */
    .explorer-toolbar {
      display: flex; align-items: center; gap: 8px; padding: 8px 0 6px;
      font-size: 10px; color: #999; border-bottom: 1px solid rgba(0,0,0,0.06); margin-bottom: 8px;
    }
    .explorer-toolbar input[type=range] {
      width: 80px; height: 3px; accent-color: #828DF8; cursor: pointer;
    }
    .explorer-toolbar span { min-width: 28px; text-align: center; }
    .tree-files { padding-left: 32px; }
    .tree-node {
      font-size: var(--explorer-font, 12px) !important;
      padding-top: var(--explorer-pad, 6px) !important;
      padding-bottom: var(--explorer-pad, 6px) !important;
    }
    .tree-file {
      display: flex; align-items: center; gap: 10px;
      padding: var(--explorer-pad, 6px) 8px; margin: 2px 0; border-radius: 8px;
      font-size: var(--explorer-font, 11px); color: #555; cursor: grab;
      border: 1px solid transparent; transition: all 0.15s;
    }
    .tree-file:hover { background: rgba(0,0,0,0.03); }
    .tree-file.dragging { opacity: 0.4; }
    .tree-file.drag-over { border-color: #828DF8; background: #EEF2FF; }
    .tree-file .file-grip { color: #ccc; cursor: grab; font-size: 10px; flex-shrink: 0; }
    .tree-file .file-thumb {
      width: var(--thumb-size, 60px); height: var(--thumb-size, 60px); border-radius: 6px; object-fit: cover;
      background: #F3F4F6; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.08);
    }
    .tree-file .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .tree-file .file-order { font-size: 9px; color: #bbb; flex-shrink: 0; }
    .tree-file .badge-thumb {
      font-size: 8px; font-weight: 700; color: #F4A259; background: #FEF3C7;
      padding: 1px 5px; border-radius: 4px; flex-shrink: 0;
    }
    .tree-file .badge-video {
      font-size: 8px; font-weight: 700; color: #EC4899; background: #FCE7F3;
      padding: 1px 5px; border-radius: 4px; flex-shrink: 0;
    }
    .btn-rename {
      width: 20px; height: 20px; border: none; background: none; cursor: pointer;
      font-size: 11px; color: #bbb; border-radius: 4px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-rename:hover { background: #E0E7FF; color: #828DF8; }
    .rename-input {
      flex: 1; padding: 2px 6px; border: 1px solid #828DF8; border-radius: 4px;
      font-size: 11px; outline: none; font-family: inherit; background: white;
    }
    .tree-node .node-actions { display: none; gap: 2px; flex-shrink: 0; }
    .tree-node:hover .node-actions { display: flex; }

    /* ── Update Banner ── */
    .update-banner {
      padding: 10px 20px; display: flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #EEF2FF, #FDF4FF);
      border-bottom: 1px solid rgba(130,141,248,0.15);
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .update-banner .update-icon { font-size: 16px; flex-shrink: 0; }
    .update-banner .update-text { flex: 1; font-size: 11px; color: #555; font-weight: 600; }
    .update-banner .update-text strong { color: #828DF8; }
    .update-banner .update-progress {
      width: 100%; height: 3px; background: #E5E7EB; border-radius: 2px; margin-top: 4px; overflow: hidden;
    }
    .update-banner .update-progress-bar {
      height: 100%; background: #828DF8; border-radius: 2px; transition: width 0.3s ease;
    }
    .btn-update {
      padding: 6px 14px; background: #828DF8; color: white; border: none;
      border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; flex-shrink: 0;
    }
    .btn-update:hover { background: #7078E8; }

    /* scrollbar */
    .file-list::-webkit-scrollbar { width: 4px; }
    .file-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
  </style>
</head>
<body>
  <!-- Title Bar -->
  <div class="titlebar">
    <span class="titlebar-title">ASSI Sync</span>
    <div class="titlebar-btns">
      <button class="btn-minimize" onclick="window.api.minimize()"></button>
      <button class="btn-maximize" onclick="window.api.maximize()"></button>
      <button class="btn-close" onclick="window.api.close()"></button>
    </div>
  </div>

  <!-- Login Screen -->
  <div id="login-screen" class="screen active">
    <div style="text-align:center">
      <div class="logo">ASSI</div>
      <div class="logo-sub">Creative Portfolio</div>
    </div>
    <p class="login-desc">로컬 폴더를 ASSI와<br>자동으로 동기화합니다</p>
    <button class="btn-google" id="btn-google-login" style="width:100%;justify-content:center">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
      Google 계정으로 로그인
    </button>
    <div style="display:flex;align-items:center;gap:12px;width:100%">
      <div style="flex:1;height:1px;background:#ddd"></div>
      <span style="font-size:10px;color:#bbb;font-weight:600">또는</span>
      <div style="flex:1;height:1px;background:#ddd"></div>
    </div>
    <div id="uid-form" style="width:100%;display:flex;flex-direction:column;gap:10px">
      <input id="uid-input" type="text" placeholder="UID를 직접 입력"
        style="width:100%;padding:14px 18px;border:1px solid #ddd;border-radius:16px;font-size:13px;outline:none;background:white;text-align:center;font-family:monospace">
      <button class="btn-google" id="btn-login" style="width:100%;justify-content:center;background:#F4F3EE;border-color:#ddd;font-size:13px;color:#666">
        UID로 연결하기
      </button>
    </div>
  </div>

  <!-- Setup Screen -->
  <div id="setup-screen" class="screen">
    <div>
      <div class="welcome" id="welcome-name">안녕하세요</div>
      <div class="welcome-sub" id="welcome-email"></div>
    </div>
    <div class="folder-box">
      <div class="folder-label">동기화 폴더</div>
      <div class="folder-path empty" id="folder-display">폴더를 선택하세요</div>
      <button class="btn-select-folder" id="btn-folder">📂 폴더 선택</button>
    </div>
    <div style="background:white;border-radius:20px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.04)">
      <div class="folder-label">동기화 방식</div>
      <p style="font-size:12px;color:#888;line-height:1.7">
        • 폴더 안의 <strong>하위 폴더</strong>가 프로젝트가 됩니다<br>
        • 이미지는 자동 리사이즈 (2048px)<br>
        • 영상은 원본 그대로 업로드<br>
        • 파일 추가/삭제 시 자동 동기화
      </p>
    </div>
    <button class="btn-start" id="btn-start" disabled>동기화 시작</button>
  </div>

  <!-- Sync Screen -->
  <div id="sync-screen" class="screen">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid rgba(0,0,0,0.04)">
      <span style="font-size:10px;font-weight:700;letter-spacing:0.1em;color:#999" id="sync-user-label"></span>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn-stop" id="btn-open-web" style="font-size:10px;color:#828DF8;border-color:#C7D2FE;padding:4px 10px;border-radius:6px" title="ASSI 웹사이트 열기">🌐 ASSI</button>
        <button class="btn-stop" id="btn-logout" style="font-size:10px;color:#EF4444;border-color:#FCA5A5;padding:4px 10px;border-radius:6px">로그아웃</button>
      </div>
    </div>
    <div class="sync-header">
      <div>
        <div class="sync-status" id="sync-status">
          <span class="dot syncing"></span>동기화 중...
        </div>
        <div class="sync-info" id="sync-info"></div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn-stop" id="btn-change-folder" title="폴더 변경">📂</button>
        <button class="btn-stop" id="btn-stop">중지</button>
      </div>
    </div>
    <div style="display:flex;gap:4px;padding:8px 16px 0 16px">
      <button id="tab-activity" class="tab-btn active" style="flex:1;padding:8px;font-size:11px;font-weight:700;border:none;background:#111;color:#fff;border-radius:8px;cursor:pointer">활동</button>
      <button id="tab-explorer" class="tab-btn" style="flex:1;padding:8px;font-size:11px;font-weight:700;border:1px solid rgba(0,0,0,0.08);background:#fff;color:#666;border-radius:8px;cursor:pointer">탐색기</button>
    </div>
    <div id="explorer-pane" style="display:none;padding:12px 16px;flex:1;overflow:auto"></div>
    <div id="synced-section" class="pending-section" style="display:none">
      <div class="pending-header">업로드 완료</div>
      <div id="synced-list"></div>
    </div>
    <div id="pending-section" class="pending-section" style="display:none">
      <div class="pending-header">대기 중인 폴더</div>
      <div id="pending-list"></div>
    </div>
    <div class="file-list" id="file-list">
      <div class="empty-state">
        <span>📂</span>
        <p>파일을 감지하는 중...</p>
      </div>
    </div>
    <div class="summary-bar" id="summary-bar" style="display:none">
      <span class="summary-text" id="summary-text"></span>
      <button class="btn-retry-all" id="btn-retry-all" style="display:none">모두 재시도</button>
    </div>
  </div>

  <div id="update-banner" style="display:none"></div>
  <div id="folder-toasts"></div>
  <script src="app.js"></script>
</body>
</html>
