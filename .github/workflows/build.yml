name: Build Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ASSI-Sync-Mac
          path: |
            dist/*.dmg
            dist/*.zip

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ASSI-Sync-Windows
          path: dist/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: ASSI-Sync-Mac
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ASSI-Sync-Windows
          path: release-assets

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ASSI Sync v${{ steps.version.outputs.version }}
          body: |
            ## ASSI Sync v${{ steps.version.outputs.version }}

            ### 다운로드

            **🪟 Windows**
            - `ASSI-Sync-Windows-${{ steps.version.outputs.version }}.exe` 다운로드 → 더블클릭 → 설치
            - SmartScreen 경고: "추가 정보 → 실행" 클릭

            **🍎 Mac** (DMG 배포 안 함 — macOS Sequoia 호환을 위해 ZIP 사용)
            - Apple Silicon (M1/M2/M3/M4): `ASSI-Sync-Mac-${{ steps.version.outputs.version }}-arm64.zip`
            - Intel Mac: `ASSI-Sync-Mac-${{ steps.version.outputs.version }}-x64.zip`
            - 내 칩 확인: 🍎 → 이 Mac에 관하여 → 칩/프로세서 항목

            **Mac 설치 순서**
            1. ZIP 다운로드 → 더블클릭하면 자동 압축 해제
            2. 나온 **ASSI Sync.app** 을 **응용 프로그램(Applications)** 폴더로 드래그
            3. Launchpad 또는 응용 프로그램에서 실행
            4. "손상되어 열 수 없습니다" 경고 시:
               - **시스템 설정 → 개인정보 보호 및 보안** 진입
               - 하단으로 스크롤 → "ASSI Sync이(가) 차단되었습니다" 옆 **"확인 없이 열기"** 클릭
               - Mac 비밀번호 입력 → 다시 실행 → **열기** 선택
            5. 그래도 안 되면 터미널에서:
               ```
               xattr -cr /Applications/ASSI\ Sync.app
               ```

            > ⚠️ Apple Developer 서명 적용 전까지는 위 Gatekeeper 해제 과정이 1회 필요합니다. 서명 적용 후에는 다운로드 → 바로 실행으로 간소화됩니다.
          files: release-assets/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
