name: Build Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Apple code signing keychain
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          # Decode p12 from base64
          echo -n "$CSC_LINK" | base64 --decode > /tmp/cert.p12

          # Create a fresh keychain for CI
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="ci_build_temp"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate — -A flag allows any app to access, -T adds specific apps
          security import /tmp/cert.p12 -P "$CSC_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # CRITICAL: Allow codesign to access the key without GUI prompt
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Make this keychain the default search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

          # Verify identity is found
          echo "=== Identities in keychain ==="
          security find-identity -v "$KEYCHAIN_PATH"

          # Export keychain path for electron-builder
          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> $GITHUB_ENV

          # Clean up p12
          rm /tmp/cert.p12

      - name: Install dependencies
        run: npm ci

      - name: Build & sign macOS (no notarize)
        run: npx electron-builder --mac --publish never
        timeout-minutes: 15
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "true"
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: List build artifacts
        run: ls -la dist/

      - name: Notarize x64 ZIP
        run: |
          ZIP_X64=$(ls dist/ASSI-Sync-Mac-*-x64.zip 2>/dev/null | head -1)
          if [ -z "$ZIP_X64" ]; then echo "No x64 ZIP found, skipping"; exit 0; fi
          echo "Submitting $ZIP_X64 to Apple notarization..."
          xcrun notarytool submit "$ZIP_X64" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 15m 2>&1
          echo "x64 notarization complete"
        timeout-minutes: 20
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Notarize arm64 ZIP
        run: |
          ZIP_ARM=$(ls dist/ASSI-Sync-Mac-*-arm64.zip 2>/dev/null | head -1)
          if [ -z "$ZIP_ARM" ]; then echo "No arm64 ZIP found, skipping"; exit 0; fi
          echo "Submitting $ZIP_ARM to Apple notarization..."
          xcrun notarytool submit "$ZIP_ARM" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 15m 2>&1
          echo "arm64 notarization complete"
        timeout-minutes: 20
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ASSI-Sync-Mac
          path: dist/*.zip

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ASSI-Sync-Windows
          path: dist/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: ASSI-Sync-Mac
          path: release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ASSI-Sync-Windows
          path: release-assets

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ASSI Sync v${{ steps.version.outputs.version }}
          body: |
            ## ASSI Sync v${{ steps.version.outputs.version }}

            ### 다운로드

            **🪟 Windows**
            - `ASSI-Sync-Windows-${{ steps.version.outputs.version }}.exe` 다운로드 → 더블클릭 → 설치
            - SmartScreen 경고: "추가 정보 → 실행" 클릭

            **🍎 Mac** (Apple 공증 완료 — 별도 설정 없이 바로 실행)
            - Apple Silicon (M1/M2/M3/M4): `ASSI-Sync-Mac-${{ steps.version.outputs.version }}-arm64.zip`
            - Intel Mac: `ASSI-Sync-Mac-${{ steps.version.outputs.version }}-x64.zip`
            - 내 칩 확인: 🍎 → 이 Mac에 관하여 → 칩/프로세서 항목

            **Mac 설치 순서**
            1. ZIP 다운로드 → 더블클릭하면 자동 압축 해제
            2. 나온 **ASSI Sync.app** 을 **응용 프로그램(Applications)** 폴더로 드래그
            3. Launchpad 또는 응용 프로그램에서 실행 → 끝
          files: release-assets/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
